# Al Sicomoro — Ristorante Eritreo & Etiope a Milano Porta Venezia
# Static Site Nginx Configuration
# Canonical URL: alsicomoro.com  (www → canonical redirect)
#
# To obtain SSL after DNS points here:
#   sudo certbot --nginx -d alsicomoro.com -d www.alsicomoro.com
# Certbot will automatically add the SSL server blocks.

server {
    listen 80;
    server_name alsicomoro.com www.alsicomoro.com 144.91.78.67;

    root /opt/alsicomoro;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Static assets — cache for 1 year
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PDF menu — moderate cache
    location ~* \.pdf$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Sitemap, webmanifest, robots — short cache
    location ~* ^/(sitemap\.xml|site\.webmanifest|robots\.txt)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Main location
    location / {
        try_files $uri $uri/ =404;

        # Don't cache HTML
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ── Canonical URL: redirect www → non-www ──────────────────
    if ($host = www.alsicomoro.com) {
        return 301 http://alsicomoro.com$request_uri;
    }
}
